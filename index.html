<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SX2TEAM - Key Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f0a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(16, 185, 129, 0.06), transparent 60%);
        }

        .container {
            max-width: 440px;
            width: 100%;
            background: rgba(10, 15, 10, 0.96);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 32px;
            padding: 48px 36px;
            border: 1px solid rgba(16, 185, 129, 0.08);
            box-shadow: 0 48px 96px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(16, 185, 129, 0.03);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(16, 185, 129, 0.02), transparent 50%);
            pointer-events: none;
        }

        .icon {
            font-size: 56px;
            color: #10b981;
            margin-bottom: 12px;
            display: block;
        }

        h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        h1 span {
            color: #10b981;
            text-shadow: 0 0 40px rgba(16, 185, 129, 0.15);
        }

        .sub {
            color: rgba(255, 255, 255, 0.08);
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 6px 0 28px 0;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 18px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            background: rgba(16, 185, 129, 0.05);
            color: rgba(16, 185, 129, 0.4);
            border: 1px solid rgba(16, 185, 129, 0.04);
            transition: all 0.4s ease;
        }

        .status-badge.ready {
            background: rgba(16, 185, 129, 0.05);
            color: rgba(16, 185, 129, 0.4);
            border-color: rgba(16, 185, 129, 0.04);
        }

        .status-badge.loading {
            background: rgba(96, 165, 250, 0.06);
            color: #60a5fa;
            border-color: rgba(96, 165, 250, 0.08);
        }

        .status-badge.success {
            background: rgba(16, 185, 129, 0.08);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.12);
        }

        .status-badge.error {
            background: rgba(239, 68, 68, 0.06);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.08);
        }

        .status-badge.expired {
            background: rgba(245, 158, 11, 0.06);
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.08);
        }

        .status-badge.cooldown {
            background: rgba(245, 158, 11, 0.06);
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.08);
        }
        
        .status-badge.blacklisted {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.15);
        }

        .btn-generate {
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.35s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 48px rgba(16, 185, 129, 0.25);
        }

        .btn-generate:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-generate i {
            margin-right: 8px;
        }

        .key-display {
            display: none;
            margin-top: 24px;
            padding: 20px;
            background: rgba(16, 185, 129, 0.02);
            border: 2px solid rgba(16, 185, 129, 0.08);
            border-radius: 16px;
            animation: fadeSlideIn 0.5s ease;
        }

        .key-display.show {
            display: block;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .key-display .label {
            color: rgba(255, 255, 255, 0.12);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-weight: 600;
        }

        .key-display .value {
            color: #10b981;
            font-size: 22px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            margin: 12px 0 14px 0;
            padding: 14px 12px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 10px;
            letter-spacing: 1.5px;
            word-break: break-all;
            border: 1px solid rgba(16, 185, 129, 0.04);
            text-shadow: 0 0 30px rgba(16, 185, 129, 0.04);
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.25);
            padding: 8px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.06);
        }

        .key-hint {
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.03);
            font-size: 9px;
            letter-spacing: 1px;
        }

        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            color: #10b981;
            background: rgba(16, 185, 129, 0.04);
            border: 1px solid rgba(16, 185, 129, 0.06);
        }

        .message.error {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.04);
            border: 1px solid rgba(239, 68, 68, 0.06);
        }

        .message.info {
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.04);
            border: 1px solid rgba(96, 165, 250, 0.06);
        }

        .message.warning {
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.04);
            border: 1px solid rgba(245, 158, 11, 0.06);
        }
        
        .message.blacklisted {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.12);
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-top: 2px solid #10b981;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .debug-box {
            margin-top: 16px;
            padding: 12px 14px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 8px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.08);
            font-family: 'SF Mono', 'Consolas', monospace;
            text-align: left;
            display: none;
            word-break: break-all;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .debug-box.show {
            display: block;
        }

        .debug-box .line {
            color: rgba(255, 255, 255, 0.06);
        }

        .footer {
            margin-top: 28px;
            color: rgba(255, 255, 255, 0.01);
            font-size: 7px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .cooldown-timer {
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.08);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 20px;
                border-radius: 24px;
            }
            h1 {
                font-size: 22px;
            }
            .key-display .value {
                font-size: 18px;
                padding: 12px 10px;
            }
            .btn-generate {
                font-size: 14px;
                padding: 16px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <span class="icon"><i class="fas fa-key"></i></span>
        <h1>SX2<span>TEAM</span></h1>
        <div class="sub">Key Generator</div>

        <div class="status-badge ready" id="statusBadge">
            <i class="fas fa-shield-halved"></i> Ready
        </div>

        <button class="btn-generate" id="generateBtn" onclick="startProcess()">
            <i class="fas fa-rocket"></i> GET KEY
        </button>

        <div class="key-display" id="keyDisplay">
            <div class="label">🎯 Your Activation Key</div>
            <div class="value" id="keyValue">SX2-TEAM-XXXXXX</div>
            <button class="copy-btn" onclick="copyKey()">
                <i class="fas fa-copy"></i> Copy Key
            </button>
            <div class="key-hint">Use this key in the app to activate your IP</div>
        </div>

        <div class="cooldown-timer" id="cooldownTimer"></div>

        <div class="message" id="message"></div>

        <div class="debug-box" id="debugBox"></div>

        <div class="footer">SECURE · GREEN · SX2TEAM</div>

    </div>

    <script>
        /**
         * ============================================================
         *  CONFIGURATION
         * ============================================================
         */
        const API_URL = 'https://sx2lador.xyz/api/generate.php';
        const TOKEN_URL = 'https://sx2lador.xyz/api/get_token.php';
        const CHECK_IP_URL = 'https://sx2lador.xyz/api/check_ip.php';
        const CHECK_BLACKLIST_URL = 'https://sx2lador.xyz/api/check_blacklist.php';
        const API_KEY = 'SX2TEAM-SECRET-2024-XYZ789-ABCDEF';
        const SHORT_URL = 'https://short-jambo.ink/Sx2TeamGetKey';
        const COOLDOWN_HOURS = 24;

        /**
         * ============================================================
         *  DOM REFS
         * ============================================================
         */
        const $ = (id) => document.getElementById(id);
        const statusBadge = $('statusBadge');
        const generateBtn = $('generateBtn');
        const keyDisplay = $('keyDisplay');
        const keyValue = $('keyValue');
        const messageEl = $('message');
        const debugBox = $('debugBox');
        const cooldownTimer = $('cooldownTimer');

        /**
         * ============================================================
         *  HELPERS
         * ============================================================
         */
        function setStatus(text, type = 'ready') {
            statusBadge.innerHTML = text;
            statusBadge.className = 'status-badge ' + type;
        }

        function showMessage(text, type = 'info') {
            messageEl.textContent = text;
            messageEl.className = 'message show ' + type;
        }

        function hideMessage() {
            messageEl.className = 'message';
            messageEl.textContent = '';
        }

        function debugLog(msg) {
            debugBox.classList.add('show');
            const time = new Date().toLocaleTimeString();
            debugBox.innerHTML += `<div class="line">[${time}] ${msg}</div>`;
            debugBox.scrollTop = debugBox.scrollHeight;
            console.log(`[DEBUG] ${msg}`);
        }

        function setButton(text, disabled = false, icon = null) {
            generateBtn.disabled = disabled;
            if (icon) {
                generateBtn.innerHTML = `<i class="fas ${icon}"></i> ${text}`;
            } else {
                generateBtn.textContent = text;
            }
        }

        function showKey(key) {
            keyValue.textContent = key;
            keyDisplay.classList.add('show');
        }

        function hideKey() {
            keyDisplay.classList.remove('show');
        }

        function copyKey() {
            const key = keyValue.textContent;
            if (!key || key === 'SX2-TEAM-XXXXXX') return;

            navigator.clipboard.writeText(key)
                .then(() => {
                    const btn = document.querySelector('.copy-btn');
                    btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                    setTimeout(() => {
                        btn.innerHTML = '<i class="fas fa-copy"></i> Copy Key';
                    }, 2000);
                })
                .catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = key;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    textarea.remove();
                    const btn = document.querySelector('.copy-btn');
                    btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                    setTimeout(() => {
                        btn.innerHTML = '<i class="fas fa-copy"></i> Copy Key';
                    }, 2000);
                });
        }

        /**
         * ============================================================
         *  COOLDOWN SYSTEM (24 HOURS)
         * ============================================================
         */
        function getCooldownKey() {
            return 'cooldown_' + API_KEY;
        }

        function getCooldownEnd() {
            const stored = localStorage.getItem(getCooldownKey());
            if (!stored) return null;
            return new Date(parseInt(stored));
        }

        function setCooldown() {
            const endTime = Date.now() + (COOLDOWN_HOURS * 60 * 60 * 1000);
            localStorage.setItem(getCooldownKey(), endTime.toString());
            updateCooldownUI();
        }

        function isCooldownActive() {
            const end = getCooldownEnd();
            if (!end) return false;
            return Date.now() < end.getTime();
        }

        function getRemainingTime() {
            const end = getCooldownEnd();
            if (!end) return null;
            const remaining = end.getTime() - Date.now();
            if (remaining <= 0) {
                localStorage.removeItem(getCooldownKey());
                return null;
            }
            return remaining;
        }

        function formatCooldown(ms) {
            const hours = Math.floor(ms / (60 * 60 * 1000));
            const minutes = Math.floor((ms % (60 * 60 * 1000)) / (60 * 1000));
            const seconds = Math.floor((ms % (60 * 1000)) / 1000);
            if (hours > 0) return `${hours}h ${minutes}m ${seconds}s`;
            if (minutes > 0) return `${minutes}m ${seconds}s`;
            return `${seconds}s`;
        }

        function updateCooldownUI() {
            const remaining = getRemainingTime();
            if (remaining && remaining > 0) {
                cooldownTimer.textContent = `⏳ Next key available in: ${formatCooldown(remaining)}`;
                cooldownTimer.style.display = 'block';
                setButton('Wait...', true, 'fa-clock');
                setStatus('<i class="fas fa-clock"></i> Cooldown', 'cooldown');
                return true;
            } else {
                cooldownTimer.style.display = 'none';
                localStorage.removeItem(getCooldownKey());
                return false;
            }
        }

        /**
         * ============================================================
         *  🔥 CHECK BLACKLIST (منع IP من الحصول على مفتاحين)
         * ============================================================
         */
        async function checkBlacklist() {
            try {
                debugLog('📤 Checking blacklist status...');
                const response = await fetch(CHECK_BLACKLIST_URL, {
                    method: 'GET',
                    headers: {
                        'X-API-Key': API_KEY
                    }
                });
                const data = await response.json();
                debugLog(`📦 Blacklist status: ${data.blacklisted ? 'BLACKLISTED ❌' : 'Clean ✅'}`);
                return data;
            } catch (error) {
                debugLog('⚠️ Failed to check blacklist: ' + error.message);
                return { blacklisted: false };
            }
        }

        /**
         * ============================================================
         *  🔥 CHECK IP STATUS
         * ============================================================
         */
        async function checkIPStatus() {
            try {
                debugLog('📤 Checking IP status...');
                const response = await fetch(CHECK_IP_URL, {
                    method: 'GET',
                    headers: {
                        'X-API-Key': API_KEY
                    }
                });
                const data = await response.json();
                debugLog(`📦 IP status: ${data.active ? 'Active' : 'Not active'}`);
                return data;
            } catch (error) {
                debugLog('⚠️ Failed to check IP status: ' + error.message);
                return { active: true };
            }
        }

        /**
         * ============================================================
         *  🔥 CLEAR COOLDOWN IF NEEDED
         * ============================================================
         */
        async function clearCooldownIfNeeded() {
            const status = await checkIPStatus();
            
            if (!status.active) {
                localStorage.removeItem(getCooldownKey());
                sessionStorage.removeItem('generated_key');
                hideKey();
                debugLog('🔄 IP not active. Cooldown cleared.');
                return true;
            }
            return false;
        }

        /**
         * ============================================================
         *  🔑 GET TEMP TOKEN (معدل - إرسال المفتاح في Body)
         * ============================================================
         */
        async function getTempToken() {
            try {
                debugLog('📤 Requesting temp token...');
                
                // ✅ إرسال المفتاح في Body بدلاً من Header
                const formData = new FormData();
                formData.append('api_key', API_KEY);
                
                const response = await fetch(TOKEN_URL, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                debugLog(`📦 Token response: ${JSON.stringify(data)}`);

                if (data.success && data.token) {
                    sessionStorage.setItem('session_id', data.session_id);
                    debugLog(`✅ Temp token received: ${data.token.substring(0, 20)}...`);
                    debugLog(`✅ Session ID: ${data.session_id.substring(0, 20)}...`);
                    return data.token;
                } else {
                    debugLog(`❌ Failed to get token: ${data.message || 'Unknown error'}`);
                    return null;
                }
            } catch (error) {
                debugLog(`❌ Error getting temp token: ${error.message}`);
                return null;
            }
        }

        /**
         * ============================================================
         *  MAIN: START PROCESS (GET KEY)
         * ============================================================
         */
        async function startProcess() {
            // 🔥 الخطوة 0: التحقق من Blacklist (منع IP من الحصول على مفتاحين)
            const blacklistStatus = await checkBlacklist();
            
            if (blacklistStatus.blacklisted) {
                showMessage('🚫 Your IP has been blacklisted for attempting to get multiple keys. This is permanent.', 'blacklisted');
                setButton('Blocked', true, 'fa-ban');
                setStatus('<i class="fas fa-ban"></i> Blacklisted', 'blacklisted');
                debugLog('🚫 IP is blacklisted. Access denied.');
                return;
            }

            // 🔥 الخطوة 1: التحقق من صلاحية IP ومسح الـ Cooldown إذا لزم الأمر
            const cooldownCleared = await clearCooldownIfNeeded();
            
            if (cooldownCleared) {
                updateCooldownUI();
                setButton('GET KEY', false, 'fa-rocket');
                setStatus('<i class="fas fa-shield-halved"></i> Ready', 'ready');
                showMessage('✅ Your IP is not active. You can request a new key.', 'info');
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            // --- Check cooldown ---
            if (isCooldownActive()) {
                showMessage(`⏳ Please wait ${formatCooldown(getRemainingTime())} before requesting another key.`, 'warning');
                updateCooldownUI();
                return;
            }

            // --- Check if already has a key ---
            if (sessionStorage.getItem('generated_key')) {
                sessionStorage.removeItem('generated_key');
                hideKey();
                debugLog('🔄 Old key removed, generating new one...');
            }

            // --- Reset UI ---
            hideMessage();
            hideKey();
            setButton('Requesting token...', true, 'fa-spinner fa-spin');
            setStatus('<i class="fas fa-key"></i> Getting security token...', 'loading');
            debugLog('🚀 Starting process...');

            // --- 🔑 Get temp token first ---
            const tempToken = await getTempToken();
            if (!tempToken) {
                showMessage('❌ Failed to get security token. Please try again.', 'error');
                setButton('GET KEY', false, 'fa-rocket');
                setStatus('<i class="fas fa-exclamation-triangle"></i> Error', 'error');
                return;
            }

            // --- Save temp token ---
            sessionStorage.setItem('temp_token', tempToken);
            debugLog('🔐 Temp token saved.');

            // --- Save state ---
            sessionStorage.setItem('waiting_for_return', 'true');
            sessionStorage.setItem('start_time', Date.now().toString());

            // --- Build return URL ---
            const returnUrl = window.location.href.split('?')[0];
            const shortUrl = SHORT_URL + '?url=' + encodeURIComponent(returnUrl);

            debugLog('🔗 Redirecting to: ' + shortUrl);
            setButton('Redirecting...', true, 'fa-spinner fa-spin');
            setStatus('<i class="fas fa-link"></i> Redirecting...', 'loading');
            showMessage('⏳ Redirecting to link shortener...', 'info');

            // --- GO! ---
            window.location.href = shortUrl;
        }

        /**
         * ============================================================
         *  HANDLE RETURN (after link shortener)
         * ============================================================
         */
        async function handleReturn() {
            const waiting = sessionStorage.getItem('waiting_for_return');
            const startTime = parseInt(sessionStorage.getItem('start_time') || '0');
            const now = Date.now();

            debugLog(`🔄 Checking return: waiting=${waiting}, elapsed=${now - startTime}ms`);

            // --- Not waiting OR expired (5 min) ---
            if (waiting !== 'true') {
                debugLog('ℹ️ Not waiting for return.');
                return;
            }

            if (now - startTime > 300000) {
                sessionStorage.removeItem('waiting_for_return');
                sessionStorage.removeItem('temp_token');
                sessionStorage.removeItem('session_id');
                setStatus('<i class="fas fa-clock"></i> Expired', 'expired');
                showMessage('⏳ Session expired. Please try again.', 'warning');
                debugLog('⏳ Session expired.');
                setButton('GET KEY', false, 'fa-rocket');
                return;
            }

            // --- Clear waiting state ---
            sessionStorage.removeItem('waiting_for_return');

            // --- Get temp token and session ID ---
            const tempToken = sessionStorage.getItem('temp_token');
            const sessionId = sessionStorage.getItem('session_id');
            
            if (!tempToken || !sessionId) {
                showMessage('❌ Security data missing. Please try again.', 'error');
                setButton('GET KEY', false, 'fa-rocket');
                setStatus('<i class="fas fa-exclamation-triangle"></i> Error', 'error');
                return;
            }

            debugLog(`🔐 Using temp token: ${tempToken.substring(0, 20)}...`);
            debugLog(`🔐 Using session ID: ${sessionId.substring(0, 20)}...`);

            // --- UI: Generating ---
            setButton('Generating...', true, 'fa-spinner fa-spin');
            setStatus('<i class="fas fa-cog"></i> Generating...', 'loading');
            showMessage('⏳ Generating your key...', 'info');
            debugLog('📤 Requesting key from API...');

            try {
                // --- Build FormData ---
                const formData = new FormData();
                formData.append('action', 'generate');
                formData.append('api_key', API_KEY);

                // --- Send request with temp token and session ID ---
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'X-API-Key': API_KEY,
                        'X-Temp-Token': tempToken,
                        'X-Session-ID': sessionId
                    },
                    body: formData
                });

                debugLog(`📥 Response status: ${response.status}`);

                // --- Parse response ---
                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    const text = await response.text();
                    debugLog(`⚠️ Invalid JSON: ${text.substring(0, 200)}`);
                    throw new Error('Invalid response from server');
                }

                debugLog(`📦 Data: ${JSON.stringify(data)}`);

                // --- Handle success ---
                if (data.success && data.key) {
                    // ✅ Save key
                    sessionStorage.setItem('generated_key', data.key);
                    sessionStorage.removeItem('temp_token');
                    sessionStorage.removeItem('session_id');

                    // ✅ Start 24-hour cooldown
                    setCooldown();

                    // ✅ Show key
                    showKey(data.key);
                    setStatus('<i class="fas fa-check-circle"></i> Key Ready', 'success');
                    showMessage('✅ Key generated successfully! Copy and use it.', 'success');
                    debugLog(`✅ Key generated: ${data.key}`);

                    // ✅ Button stays as "GET KEY"
                    setButton('GET KEY', false, 'fa-rocket');

                    // --- Update cooldown timer ---
                    updateCooldownUI();

                    // --- Clean URL ---
                    if (window.history && window.history.replaceState) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } else {
                    // --- Error from API ---
                    const errMsg = data.message || 'Unknown error';
                    
                    // 🔥 إذا كان الخطأ بسبب Blacklist، نظهر رسالة خاصة
                    if (errMsg.includes('blacklisted') || errMsg.includes('blocked')) {
                        setStatus('<i class="fas fa-ban"></i> Blacklisted', 'blacklisted');
                        showMessage(`🚫 ${errMsg}`, 'blacklisted');
                        setButton('Blocked', true, 'fa-ban');
                    } else {
                        setStatus('<i class="fas fa-exclamation-triangle"></i> Error', 'error');
                        showMessage(`❌ ${errMsg}`, 'error');
                        setButton('GET KEY', false, 'fa-rocket');
                    }
                    debugLog(`❌ API error: ${errMsg}`);
                }

            } catch (error) {
                // --- Network or parsing error ---
                debugLog(`❌ Exception: ${error.message}`);
                setStatus('<i class="fas fa-exclamation-triangle"></i> Error', 'error');
                showMessage(`❌ Connection error: ${error.message}`, 'error');
                setButton('GET KEY', false, 'fa-rocket');
            }
        }

        /**
         * ============================================================
         *  INIT: On page load
         * ============================================================
         */
        document.addEventListener('DOMContentLoaded', async function() {
            debugLog('🚀 Page loaded.');

            // 🔥 الخطوة 0: التحقق من Blacklist
            const blacklistStatus = await checkBlacklist();
            
            if (blacklistStatus.blacklisted) {
                showMessage('🚫 Your IP has been blacklisted for attempting to get multiple keys. This is permanent.', 'blacklisted');
                setButton('Blocked', true, 'fa-ban');
                setStatus('<i class="fas fa-ban"></i> Blacklisted', 'blacklisted');
                debugLog('🚫 IP is blacklisted. Access denied.');
                return;
            }

            // 🔥 الخطوة 1: التحقق من صلاحية IP ومسح الـ Cooldown إذا لزم الأمر
            await clearCooldownIfNeeded();

            // --- Check cooldown ---
            const cooldownActive = updateCooldownUI();

            // --- Check for saved key (only if not in cooldown) ---
            const savedKey = sessionStorage.getItem('generated_key');

            if (savedKey && !cooldownActive) {
                showKey(savedKey);
                setStatus('<i class="fas fa-check-circle"></i> Key Ready', 'success');
                setButton('GET KEY', false, 'fa-rocket');
                debugLog(`📂 Loaded saved key: ${savedKey}`);
            } else if (savedKey && cooldownActive) {
                showKey(savedKey);
                setStatus('<i class="fas fa-check-circle"></i> Key Ready', 'success');
                setButton('GET KEY', false, 'fa-rocket');
                debugLog(`📂 Loaded saved key with cooldown: ${savedKey}`);
            } else {
                setButton('GET KEY', false, 'fa-rocket');
                if (!cooldownActive) {
                    setStatus('<i class="fas fa-shield-halved"></i> Ready', 'ready');
                }
                debugLog('📂 No saved key found.');
            }

            // --- Handle return from shortener ---
            handleReturn();

            // --- Cooldown timer update every second ---
            if (isCooldownActive()) {
                setInterval(() => {
                    const active = updateCooldownUI();
                    if (!active) {
                        setButton('GET KEY', false, 'fa-rocket');
                        setStatus('<i class="fas fa-shield-halved"></i> Ready', 'ready');
                    }
                }, 1000);
            }
        });

        // --- Expose functions to global scope ---
        window.copyKey = copyKey;
        window.startProcess = startProcess;
    </script>

</body>
</html>
