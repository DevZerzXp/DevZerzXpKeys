    <script>
        // --- تأثير الماتريكس الأخضر ---
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789🔒🔑✅';
        const fontSize = 16; const columns = canvas.width / fontSize;
        const drops = Array.from({length: columns}).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(3, 3, 3, 0.08)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff00'; ctx.font = fontSize + 'px Courier New';
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        function setSuccess(id, text) {
            const el = document.getElementById(id);

            el.querySelector('.status').innerText = text;
        }

        // --- العداد التنازلي (10 ثواني) ---
        function startCountdown() {
            let count = 10;
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                count--;
                timerEl.innerText = count;
                if (count <= 0) {
                    clearInterval(interval);
                    generateAndSaveKey();
                }
            }, 1000);
        }

        function generateRandomString(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // --- توليد المفتاح ورفعه للفايربيس ---

            const serverTime = Date.now();

                used: false

                document.getElementById('copyBtn').style.display = 'block';
