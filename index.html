<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZerzBan Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #121212; padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 25px rgba(0, 255, 65, 0.15); text-align: center; width: 90%; max-width: 380px; }
        .status-bar { font-size: 10px; color: #00ff41; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 5px; opacity: 0.7; }
        .status-dot { height: 7px; width: 7px; background-color: #00ff41; border-radius: 50%; display: inline-block; box-shadow: 0 0 5px #00ff41; margin-left: 5px; }
        h1 { font-size: 20px; color: #fff; margin-bottom: 15px; letter-spacing: 2px; }
        .channel-link { color: #00ff41; font-size: 13px; text-decoration: none; display: block; margin-bottom: 20px; }
        .key-display { background: #000; padding: 20px; border-radius: 12px; border: 1px dashed #333; font-size: 17px; margin: 20px 0; color: #fff; min-height: 25px; letter-spacing: 1px; }
        .loader { width: 0%; height: 4px; background: #00ff41; margin-bottom: 15px; transition: 0.3s; border-radius: 2px; box-shadow: 0 0 10px #00ff41; }
        button { width: 100%; padding: 14px; background: #00ff41; border: none; color: #000; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; font-family: inherit; transition: 0.3s; }
        button:disabled { background: #222; color: #555; }
        .copy-btn { background: #1a1a1a; color: #00ff41; border: 1px solid #00ff41; }
        .note { font-size: 10px; color: #555; margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-bar"><span class="status-dot"></span> SYSTEM ONLINE | VERSION 2.0</div>
        <h1>ZerzBan Panel</h1>
        <a href="https://t.me/ZerzBanXCheats" class="channel-link">@YourChannel</a>
        
        <div id="loader" class="loader"></div>
        <div id="keyBox" class="key-display"></div>
        
        <button id="genBtn" onclick="generateKey()">توليد مفتاح جديد</button>
        <button id="copyBtn" class="copy-btn" onclick="copyKey()">نسخ المفتاح</button>
        
        <p class="note">ملاحظة: المفتاح مدته 24 ساعة ويشتغل لهاتف واحد فقط. استمتع.</p>
    </div>

    <script>
        function generateKey() {
            const btn = document.getElementById("genBtn");
            const loader = document.getElementById("loader");
            const keyBox = document.getElementById("keyBox");
            
            btn.disabled = true;
            loader.style.width = "0%";
            keyBox.innerText = "";
            
            let progress = 0;
            let interval = setInterval(() => {
                progress += 20;
                loader.style.width = progress + "%";
                if(progress >= 100) {
                    clearInterval(interval);
                    const random = Math.floor(100000 + Math.random() * 900000);
                    const key = "ZerzBan-X-Cheats-" + random;
                    keyBox.innerText = key;
                    btn.disabled = false;
                }
            }, 1000);
        }

        function copyKey() {
            const btn = document.getElementById("copyBtn");
            const text = document.getElementById("keyBox").innerText;
            if(text.includes("ZerzBan")) {
                navigator.clipboard.writeText(text);
                btn.innerText = "تم النسخ بنجاح!";
                setTimeout(() => { btn.innerText = "نسخ المفتاح"; }, 2000);
            }
        }
    </script>
</body>
</html>
