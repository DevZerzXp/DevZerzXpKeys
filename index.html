<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SX2TEAM - Key Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0f0a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(16,185,129,0.06), transparent 60%);
        }
        .container {
            max-width: 440px;
            width: 100%;
            background: rgba(10,15,10,0.95);
            backdrop-filter: blur(40px);
            border-radius: 32px;
            padding: 48px 40px;
            border: 1px solid rgba(16,185,129,0.08);
            box-shadow: 0 48px 96px rgba(0,0,0,0.9);
            text-align: center;
        }
        .icon { font-size: 56px; color: #10b981; margin-bottom: 16px; }
        h1 { color: #fff; font-size: 26px; font-weight: 700; }
        h1 span { color: #10b981; }
        .sub {
            color: rgba(255,255,255,0.1);
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 6px 0 28px 0;
        }
        .btn-generate {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 48px rgba(16,185,129,0.25);
        }
        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .key-display {
            display: none;
            margin-top: 24px;
            padding: 20px;
            background: rgba(16,185,129,0.03);
            border: 2px solid rgba(16,185,129,0.12);
            border-radius: 16px;
            animation: fadeIn 0.6s ease;
        }
        .key-display.show { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .key-display .label {
            color: rgba(255,255,255,0.15);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .key-display .value {
            color: #10b981;
            font-size: 22px;
            font-family: monospace;
            margin: 12px 0;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            letter-spacing: 2px;
            word-break: break-all;
        }
        .copy-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.3);
            padding: 8px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
        }
        .message.success { color: #10b981; background: rgba(16,185,129,0.04); border: 1px solid rgba(16,185,129,0.06); }
        .message.error { color: #ef4444; background: rgba(239,68,68,0.04); border: 1px solid rgba(239,68,68,0.06); }
        .message.info { color: #60a5fa; background: rgba(96,165,250,0.04); border: 1px solid rgba(96,165,250,0.06); }
        .message.warning { color: #f59e0b; background: rgba(245,158,11,0.04); border: 1px solid rgba(245,158,11,0.06); }
        .footer { margin-top: 28px; color: rgba(255,255,255,0.02); font-size: 7px; letter-spacing: 4px; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            background: rgba(16,185,129,0.06);
            color: rgba(16,185,129,0.4);
            border: 1px solid rgba(16,185,129,0.04);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="icon"><i class="fas fa-key"></i></div>
    <h1>SX2<span>TEAM</span></h1>
    <div class="sub">Key Generator</div>
    
    <div class="status-badge" id="statusBadge">
        <i class="fas fa-shield-halved"></i> Ready
    </div>
    
    <button class="btn-generate" id="generateBtn" onclick="startProcess()">
        <i class="fas fa-rocket"></i> GET KEY
    </button>
    
    <div class="key-display" id="keyDisplay">
        <div class="label">🎯 Your Activation Key</div>
        <div class="value" id="keyValue">SX2-TEAM-XXXXXX</div>
        <button class="copy-btn" onclick="copyKey()"><i class="fas fa-copy"></i> Copy Key</button>
        <div style="margin-top:12px; color:rgba(255,255,255,0.05); font-size:9px; letter-spacing:1px;">
            Use this key in the app to activate your IP
        </div>
    </div>
    
    <div id="message"></div>
    
    <div class="footer">SECURE · GREEN · SX2TEAM</div>
</div>

<script>
    const API_URL = 'https://sx2lador.xyz/api/generate.php';
    const API_KEY = 'SX2TEAM-SECRET-2024';
    const SHORT_URL = 'https://short-jambo.ink/Sx2TeamGetKey';
    
    // 🔥 التحقق من حالة المستخدم
    function checkStatus() {
        // هل هناك مفتاح مخزن في sessionStorage؟
        const savedKey = sessionStorage.getItem('generated_key');
        if (savedKey) {
            document.getElementById('keyValue').textContent = savedKey;
            document.getElementById('keyDisplay').classList.add('show');
            document.getElementById('statusBadge').innerHTML = '<i class="fas fa-check-circle"></i> Key Ready';
            document.getElementById('generateBtn').innerHTML = '<i class="fas fa-sync"></i> Get New Key';
            return true;
        }
        return false;
    }
    
    // 🚀 البدء
    async function startProcess() {
        const btn = document.getElementById('generateBtn');
        const msg = document.getElementById('message');
        const keyDisplay = document.getElementById('keyDisplay');
        
        // إذا كان هناك مفتاح مخزن، نعطيه خيار الحصول على مفتاح جديد
        if (sessionStorage.getItem('generated_key')) {
            if (!confirm('You already have a key. Do you want a new one?')) {
                return;
            }
            // حذف المفتاح القديم
            sessionStorage.removeItem('generated_key');
            keyDisplay.classList.remove('show');
        }
        
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Redirecting...';
        msg.innerHTML = '';
        keyDisplay.classList.remove('show');
        
        // 🔥 حفظ حالة "في انتظار العودة"
        sessionStorage.setItem('waiting_for_return', 'true');
        sessionStorage.setItem('start_time', Date.now().toString());
        
        // بناء رابط العودة
        const returnUrl = window.location.href.split('?')[0];
        const shortUrl = SHORT_URL + '?url=' + encodeURIComponent(returnUrl);
        
        showMessage('⏳ Redirecting to link shortener...', 'info');
        document.getElementById('statusBadge').innerHTML = '<i class="fas fa-link"></i> Redirecting...';
        
        // التوجيه إلى short-jambo.ink
        window.location.href = shortUrl;
    }
    
    // 🔥 معالجة العودة من الاختصار
    async function handleReturn() {
        const waiting = sessionStorage.getItem('waiting_for_return');
        const startTime = parseInt(sessionStorage.getItem('start_time') || '0');
        const now = Date.now();
        
        // إذا كان ينتظر العودة ولم يمر أكثر من 5 دقائق
        if (waiting === 'true' && (now - startTime) < 300000) {
            // إزالة حالة الانتظار
            sessionStorage.removeItem('waiting_for_return');
            
            const btn = document.getElementById('generateBtn');
            const msg = document.getElementById('message');
            const keyDisplay = document.getElementById('keyDisplay');
            const keyValue = document.getElementById('keyValue');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Generating key...';
            document.getElementById('statusBadge').innerHTML = '<i class="fas fa-cog"></i> Generating...';
            
            try {
                // طلب توليد المفتاح
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({ action: 'generate' })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 💾 حفظ المفتاح في sessionStorage
                    sessionStorage.setItem('generated_key', data.key);
                    keyValue.textContent = data.key;
                    keyDisplay.classList.add('show');
                    document.getElementById('statusBadge').innerHTML = '<i class="fas fa-check-circle"></i> Key Ready';
                    showMessage('✅ Key generated successfully! Copy and use it.', 'success');
                    
                    // إزالة أي معلمات من الرابط
                    window.history.replaceState({}, document.title, window.location.pathname);
                } else {
                    showMessage('❌ ' + data.message, 'error');
                    document.getElementById('statusBadge').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error';
                }
            } catch (error) {
                showMessage('❌ Connection error. Please try again.', 'error');
                document.getElementById('statusBadge').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error';
            }
            
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-rocket"></i> GET KEY';
        } else if (waiting === 'true') {
            // انتهت المدة
            sessionStorage.removeItem('waiting_for_return');
            showMessage('⏳ Session expired. Please try again.', 'warning');
            document.getElementById('statusBadge').innerHTML = '<i class="fas fa-clock"></i> Expired';
        }
    }
    
    function copyKey() {
        const key = document.getElementById('keyValue').textContent;
        navigator.clipboard.writeText(key).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-copy"></i> Copy Key';
            }, 2000);
        });
    }
    
    function showMessage(text, type) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = 'message ' + type;
    }
    
    // 🔥 عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', function() {
        // أولاً: التحقق من وجود مفتاح مخزن
        if (!checkStatus()) {
            // ثانياً: معالجة العودة من الاختصار
            handleReturn();
        }
    });
</script>
</body>
</html>
