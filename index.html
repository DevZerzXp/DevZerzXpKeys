<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZerzBan Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* إعدادات الخلفية الأساسية */
        body { 
            margin: 0;
            padding: 0;
            background-color: #050505;
            background-image: linear-gradient(#111 1px, transparent 1px), linear-gradient(90deg, #111 1px, transparent 1px);
            background-size: 40px 40px;
            color: #00ff41; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        /* شاشة الترحيب */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; justify-content: center; align-items: center; color: #00ff41; font-size: 24px; transition: opacity 0.5s; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* الحاوية */
        .container { 
            background: #121212; 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid #333; 
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.2); 
            text-align: center; 
            width: 85%; 
            max-width: 380px;
            z-index: 1;
        }

        .status-bar { font-size: 9px; margin-bottom: 15px; opacity: 0.7; }
        h1 { font-size: 18px; color: #fff; margin-bottom: 5px; }
        
        .channel-link { 
            color: #aaa; 
            font-size: 11px; 
            text-decoration: none; 
            display: block; 
            margin-bottom: 20px; 
            border: 1px solid #333; 
            padding: 6px; 
            border-radius: 5px; 
            width: fit-content; 
            margin: 0 auto 20px auto; 
        }

        .key-display { 
            background: #000; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px dashed #555; 
            font-size: 14px; 
            margin: 20px 0; 
            color: #fff; 
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader { width: 0%; height: 3px; background: #00ff41; margin-bottom: 15px; transition: 0.3s; border-radius: 2px; }
        
        button { 
            width: 100%; 
            padding: 12px; 
            background: #00ff41; 
            border: none; 
            color: #000; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 10px; 
            font-family: inherit; 
            font-size: 14px;
        }
        
        .copy-btn { background: #1a1a1a; color: #00ff41; border: 1px solid #00ff41; margin-top: 10px; }
        .note { font-size: 10px; color: #aaa; margin-top: 15px; line-height: 1.4; padding: 10px; }
    </style>
</head>
<body>

    <div id="splash">ZerzBan <span class="blink">_</span></div>

    <div class="container">
        <div class="status-bar">SYSTEM ONLINE | VERSION 1.0 ●</div>
        <h1>ZerzBan Panel</h1>
        <a href="https://t.me/ZerzBanXCheats" class="channel-link">Telegram Channel</a>
        <div id="loader" class="loader"></div>
        <div id="keyBox" class="key-display"></div>
        <button id="genBtn" onclick="generateKey()">توليد مفتاح جديد</button>
        <button id="copyBtn" class="copy-btn" onclick="copyKey()">نسخ المفتاح</button>
        <p class="note">⚠️ ملاحظة: مسموح بمفتاح واحد كل 24 ساعة.</p>
    </div>

    <script>
        setTimeout(() => { document.getElementById("splash").style.opacity = "0"; setTimeout(() => { document.getElementById("splash").style.display = "none"; }, 500); }, 2000);

        function checkKey() {
            const savedKey = localStorage.getItem("myKey");
            const savedTime = localStorage.getItem("genTime");
            if (savedKey && savedTime) {
                const now = new Date().getTime();
                if (now - savedTime < 86400000) {
                    document.getElementById("keyBox").innerText = savedKey;
                    return true;
                }
            }
            return false;
        }

        function generateKey() {
            if (checkKey()) {
                alert("لديك مفتاح بالفعل! مسموح بمفتاح واحد كل 24 ساعة.");
                return;
            }
            const btn = document.getElementById("genBtn");
            const loader = document.getElementById("loader");
            const keyBox = document.getElementById("keyBox");
            btn.disabled = true;
            loader.style.width = "0%";
            keyBox.innerText = "...";
            let progress = 0;
            let interval = setInterval(() => {
                progress += 20;
                loader.style.width = progress + "%";
                if(progress >= 100) {
                    clearInterval(interval);
                    const random = Math.floor(100000 + Math.random() * 900000);
                    const newKey = "ZerzBan-X-Cheats-" + random;
                    localStorage.setItem("myKey", newKey);
                    localStorage.setItem("genTime", new Date().getTime());
                    keyBox.innerText = newKey;
                    btn.disabled = false;
                }
            }, 1000);
        }

        function copyKey() {
            const btn = document.getElementById("copyBtn");
            const text = document.getElementById("keyBox").innerText;
            if(text && text !== "..." && text !== "") {
                navigator.clipboard.writeText(text);
                btn.innerText = "✓ تم النسخ";
                setTimeout(() => { btn.innerText = "نسخ المفتاح"; }, 2000);
            }
        }
        window.onload = checkKey;
    </script>
</body>
</html>
