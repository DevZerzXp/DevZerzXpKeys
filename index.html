<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZerzBan Key Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        /* شاشة الترحيب (Splash Screen) */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; justify-content: center; align-items: center; color: #00ff41; font-size: 24px; transition: opacity 0.5s; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        canvas { position: absolute; top: 0; left: 0; z-index: 0; }
        
        .container { position: relative; z-index: 1; background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 85%; max-width: 380px; margin: 10% auto; }
        
        h1 { color: #fff; font-size: 20px; margin-bottom: 5px; }
        
        .channel-link { color: #00ff41; font-size: 11px; text-decoration: none; display: block; margin-bottom: 20px; }
        
        .key-display { background: #000; padding: 15px; border-radius: 10px; border: 1px dashed #555; color: #fff; margin: 20px 0; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        
        button { width: 100%; padding: 12px; background: #00ff41; border: none; color: #000; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; font-family: inherit; }
        
        .copy-btn { background: #1a1a1a; color: #00ff41; border: 1px solid #00ff41; margin-top: 10px; }
        
        .timer { font-size: 12px; color: #ff0000; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="splash">ZerzBan <span class="blink">_</span></div>

    <canvas id="canvas"></canvas>
    
    <div class="container">
        <h1>ZerzBan Key Generator</h1>
        <a href="https://t.me/ZerzBanXCheats" class="channel-link">Telegram Channel</a>
        <div id="keyBox" class="key-display"></div>
        <button id="genBtn" onclick="generateKey()">توليد مفتاح جديد</button>
        <button id="copyBtn" class="copy-btn" onclick="copyKey()">نسخ المفتاح</button>
        <div id="timer" class="timer"></div>
    </div>

    <script>
        // إخفاء شاشة الترحيب بعد ثانيتين
        setTimeout(() => { 
            document.getElementById("splash").style.opacity = "0"; 
            setTimeout(() => { document.getElementById("splash").style.display = "none"; }, 500); 
        }, 2000);

        // تأثير الكرات المتساقطة
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        canvas.height = window.innerHeight; 
        canvas.width = window.innerWidth;
        const drops = Array(Math.floor(canvas.width/20)).fill(0);
        
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; 
            ctx.font = "15px Arial";
            drops.map((y, i) => { 
                const text = "0"; 
                ctx.fillText(text, i*20, y); 
                drops[i] = y > canvas.height ? 0 : y + 20; 
            });
        }
        setInterval(draw, 50);

        // نظام المفتاح والعداد
        function updateTimer() {
            const genTime = localStorage.getItem("genTime");
            if (genTime) {
                const diff = 86400000 - (new Date().getTime() - genTime);
                if (diff > 0) {
                    const hrs = Math.floor(diff/3600000);
                    const mins = Math.floor((diff%3600000)/60000);
                    const secs = Math.floor((diff%60000)/1000); // إضافة الثواني
                    document.getElementById("timer").innerText = `متبقي للقفل: ${hrs}س ${mins}د ${secs}ث`;
                    document.getElementById("genBtn").disabled = true;
                } else { 
                    document.getElementById("timer").innerText = ""; 
                    document.getElementById("genBtn").disabled = false; 
                }
            }
        }
        setInterval(updateTimer, 1000);

        function generateKey() {
            const random = Math.floor(100000 + Math.random() * 900000);
            const key = "ZerzBan-X-" + random;
            localStorage.setItem("myKey", key);
            localStorage.setItem("genTime", new Date().getTime());
            document.getElementById("keyBox").innerText = key;
        }

        // دالة النسخ
        function copyKey() {
            const text = document.getElementById("keyBox").innerText;
            if(text) {
                navigator.clipboard.writeText(text);
                alert("تم النسخ بنجاح!");
            }
        }

        window.onload = () => { 
            if(localStorage.getItem("myKey")) {
                document.getElementById("keyBox").innerText = localStorage.getItem("myKey");
            }
            updateTimer(); 
        };
    </script>
</body>
</html>
