<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZerzBan X - لوحة التحقق</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .box { background: #0a0a0a; border: 2px solid #00ff41; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .icon { font-size: 3rem; color: #00ff41; margin-bottom: 15px; }
        .check { background: rgba(0, 255, 65, 0.1); margin: 10px 0; padding: 10px; border-radius: 10px; border-right: 3px solid #00ff41; }
        button { width: 100%; padding: 12px; background: #00ff41; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        #gen-panel { display: none; }
        .copy-btn { background: #000; color: #00ff41; border: 1px solid #00ff41; }
    </style>
</head>
<body>

    <div class="box" id="gate">
        <div class="icon"><i class="fas fa-shield-alt"></i></div>
        <h1>  Welcome to ZerzBan X Cheats </h1>
        <p style="font-size: 0.9rem; margin-bottom: 15px;">نظام توليد المفاتيح الأكثر أماناً</p>
        <div class="check">فحص الأمان: <span id="timer">10</span> ثوانٍ</div>
        
        <div id="gen-panel">
            <div id="key-display" style="margin:15px; font-size:1.2rem; color:#00ff41;">---</div>
            <button id="genBtn" onclick="generateKey()">توليد مفتاح</button>
            <button class="copy-btn" onclick="copyKey()">نسخ المفتاح</button>
            <p id="cooldown-msg" style="color:red; font-size:0.8rem; margin-top:10px;"></p>
        </div>
    </div>

    <script>
        // 1. نظام الحماية (Token + Time)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('verified') === "true") {
            sessionStorage.setItem("access_token", Date.now() + 60000);
        }
        const token = sessionStorage.getItem("access_token");
        if (!token || Date.now() > parseInt(token)) {
            window.location.href = "https://short-jambo.ink/DevZerzGetKey";
        }

        // 2. إعداد Firebase
        const firebaseConfig = { databaseURL: "https://devzerzservers-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 3. نظام 24 ساعة (LocalStorage)
        function checkCooldown() {
            const lastGen = localStorage.getItem("lastGenTime");
            if (lastGen && (Date.now() - lastGen < 86400000)) {
                document.getElementById("genBtn").disabled = true;
                document.getElementById("cooldown-msg").innerText = "لقد قمت بتوليد مفتاح بالفعل. انتظر 24 ساعة.";
                return false;
            }
            return true;
        }

        // 4. عداد الـ 10 ثوانٍ
        let count = 10;
        const timer = setInterval(() => {
            count--;
            document.getElementById('timer').innerText = count;
            if(count <= 0) {
                clearInterval(timer);
                document.getElementById('gen-panel').style.display = 'block';
                checkCooldown();
            }
        }, 1000);

        // 5. توليد ونسخ
        function generateKey() {
            if(!checkCooldown()) return;
            const random = Math.floor(100000 + Math.random() * 900000);
            const key = "ZerzBan-X-" + random;
            db.ref('keys/' + random).set({ key: key, timestamp: Date.now() });
            localStorage.setItem("lastGenTime", Date.now());
            document.getElementById("key-display").innerText = key;
            document.getElementById("genBtn").disabled = true;
            document.getElementById("cooldown-msg").innerText = "تم التوليد بنجاح!";
        }

        function copyKey() {
            const key = document.getElementById("key-display").innerText;
            navigator.clipboard.writeText(key);
            alert("تم نسخ المفتاح!");
        }
    </script>
</body>
</html>
