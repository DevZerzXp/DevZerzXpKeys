<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZerzBan X Cheats - الأمان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #0a1f0a 0%, #020502 100%);
            color: #e0ffe0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .security-container {
            background: rgba(10, 20, 10, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(0, 255, 0, 0.4);
            border-radius: 24px;
            padding: 35px 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.3), inset 0 0 20px rgba(0, 255, 0, 0.1);
        }

        .shield-icon {
            font-size: 3rem;
            color: #00ff00;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
            animation: pulse 2s infinite;
        }

        h1 {
            color: #00ff00;
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .main-status {
            font-size: 1.2rem;
            color: #ffcc00;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .check-list {
            text-align: right;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .check-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            margin: 10px 0;
            padding: 12px 15px;
            border-radius: 8px;
            border-right: 3px solid #00ff00;
            font-size: 0.95rem;
        }

        .status-icon {
            font-size: 1.1rem;
        }

        #key-panel {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 255, 0, 0.05);
            border: 1px dashed #00ff00;
            border-radius: 8px;
        }

        #key-display {
            font-family: monospace;
            font-size: 1.3rem;
            color: #00ff00;
            word-break: break-all;
            margin-top: 10px;
            display: block;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        .countdown-text {
            color: #aaaaaa;
            font-size: 0.85rem;
            margin-top: 15px;
        }

        #timer {
            color: #00ff00;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="security-container" id="main-gate-box">
        <div class="shield-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1>ZerzBan X Cheats</h1>
        
        <div class="main-status" id="gate-title">جاري فحص الأمان . . .</div>

        <div class="check-list">
            <div class="check-item" id="step-shortlink">
                <span>جاري التحقق من الرابط المختصر . . .</span>
                <span class="status-icon" id="icon-shortlink">⏳</span>
            </div>
            <div class="check-item" id="step-vpn">
                <span>جاري فحص اتصال VPN . . .</span>
                <span class="status-icon" id="icon-vpn">⏳</span>
            </div>
            <div class="check-item" id="step-session">
                <span>جاري تشفير الجلسة . . .</span>
                <span class="status-icon" id="icon-session">⏳</span>
            </div>
        </div>

        <div id="key-panel">
            <span style="color: #ffffff;">تم توليد مفتاح الوصول الخاص بك بنجاح:</span>
            <code id="key-display">جاري الاتصال بقاعدة البيانات...</code>
        </div>

        <div class="countdown-text" id="countdown-container" style="display:none;">
            سيتم عرض المفتاح وتأكيد الصلاحية خلال: <span id="timer">10</span> ثوانٍ
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
    (function(){
        // ==================== الإعدادات ====================
        const SHORTLINK = "https://short-jambo.ink/DevZerzGetKey";
        const STORAGE_KEY = "zb_gate_pass";
        const GATE_VALIDITY_MS = 15000; // 15 ثانية صلاحية العبور
        
        // ==================== Firebase ====================
        const firebaseConfig = {
            apiKey: "AIzaSyB3a21LXNAl1k9Iayfax080VSOmILsNLG0",
            authDomain: "devzerzservers.firebaseapp.com",
            databaseURL: "https://devzerzservers-default-rtdb.firebaseio.com",
            projectId: "devzerzservers",
            storageBucket: "devzerzservers.firebasestorage.app",
            messagingSenderId: "129983508495",
            appId: "1:129983508495:web:c28de3950cbca105e4737a"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ==================== دوال الواجهة ====================
        function updateElement(id, text, iconId, icon) {
            const el = document.getElementById(id);
            if (el) el.textContent = text;
            if (iconId) {
                const iconEl = document.getElementById(iconId);
                if (iconEl) iconEl.textContent = icon;
            }
        }

        function generateRandomString(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ==================== التحقق من العبور (نفس منطق الكود الأصلي) ====================
        function checkGatePass() {
            const stored = sessionStorage.getItem(STORAGE_KEY);
            if (!stored) return false;
            
            try {
                const decoded = atob(stored);
                const timestamp = parseInt(decoded.split('_')[0]);
                const now = Date.now();
                return (now - timestamp) < GATE_VALIDITY_MS;
            } catch(e) {
                return false;
            }
        }

        function storeGatePass() {
            const data = Date.now() + '_' + generateRandomString(6);
            sessionStorage.setItem(STORAGE_KEY, btoa(data));
        }

        function clearGatePass() {
            sessionStorage.removeItem(STORAGE_KEY);
        }

        // ==================== العملية الرئيسية ====================
        async function startSecurityProcess() {
            // التحقق من وجود تصريح عبور صالح (يعني أن المستخدم جاء من الرابط المختصر)
            const hasValidPass = checkGatePass();
            
            if (!hasValidPass) {
                // لم يتم العبور بعد - إعادة توجيه إلى الرابط المختصر
                // أولاً نخزن تصريح مؤقت (سيصبح صالحاً بعد العودة)
                storeGatePass();
                window.location.href = SHORTLINK;
                return;
            }
            
            // المستخدم لديه تصريح عبور صالح - متابعة العملية
            // إزالة التصريح لمنع إعادة الاستخدام
            clearGatePass();
            
            // الخطوة 1: التحقق من الرابط المختصر
            await sleep(1200);
            updateElement('step-shortlink', '✅ تم التحقق من الرابط المختصر بنجاح', 'icon-shortlink', '✅');
            
            // الخطوة 2: فحص VPN وهمي
            await sleep(1000);
            updateElement('step-vpn', '✅ لا يوجد اتصال VPN مشبوه', 'icon-vpn', '✅');
            
            // الخطوة 3: تشفير الجلسة
            await sleep(800);
            updateElement('step-session', '✅ تم تشفير الجلسة بنجاح', 'icon-session', '✅');
            
            // إظهار العد التنازلي
            document.getElementById('countdown-container').style.display = 'block';
            document.getElementById('gate-title').textContent = 'جاري تجهيز المفتاح...';
            
            let secondsLeft = 10;
            const timerElement = document.getElementById('timer');
            timerElement.textContent = secondsLeft;
            
            const countdownInterval = setInterval(() => {
                secondsLeft--;
                timerElement.textContent = secondsLeft;
                if (secondsLeft <= 0) {
                    clearInterval(countdownInterval);
                    generateAndShowKey();
                }
            }, 1000);
        }

        // توليد المفتاح وحفظه في Firebase
        function generateAndShowKey() {
            const keyPrefix = 'ZerzBan-X-Cheats-';
            const randomPart = generateRandomString(16);
            const fullKey = keyPrefix + randomPart;
            
            database.ref('keys/' + fullKey).set({
                createdAt: Date.now(),
                status: 'active',
                deviceID: 'web-client',
                used: false
            })
            .then(() => {
                document.getElementById('key-panel').style.display = 'block';
                document.getElementById('key-display').textContent = fullKey;
                document.getElementById('gate-title').textContent = 'تم بنجاح! ✅';
                document.getElementById('countdown-container').style.display = 'none';
            })
            .catch(error => {
                console.error('خطأ في حفظ المفتاح:', error);
                document.getElementById('key-display').textContent = 'حدث خطأ، حاول مرة أخرى';
            });
        }

        // بدء العملية تلقائياً
        window.addEventListener('load', startSecurityProcess);
    })();
    </script>
</body>
</html>
