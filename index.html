<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZerzBan Generator</title>
    <style>
        body {
            background-color: #000000;
            color: #00ff41;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .panel {
            border: 2px solid #00ff41;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            background: #111;
        }
        h1 { text-transform: uppercase; letter-spacing: 3px; }
        button {
            background: transparent;
            color: #00ff41;
            border: 2px solid #00ff41;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 15px #00ff41;
        }
        #keyBox {
            margin-top: 30px;
            padding: 15px;
            border: 1px dashed #00ff41;
            font-size: 22px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>ZerzBan Panel</h1>
        <button onclick="generateKey()">توليد مفتاح</button>
        <div id="keyBox">اضغط لتوليد مفتاح</div>
    </div>
    <script>
        function generateKey() {
            const random = Math.floor(100000 + Math.random() * 900000);
            const key = "ZerzBan-X-Cheats-" + random;
            document.getElementById("keyBox").innerText = key;
        }
    </script>
</body>
</html>
