<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZerzBan Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #121212; padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); text-align: center; width: 90%; max-width: 400px; }
        h1 { font-size: 22px; color: #fff; margin-bottom: 10px; }
        .channel-link { color: #00ff41; font-size: 14px; text-decoration: none; margin-bottom: 20px; display: block; }
        .key-display { background: #000; padding: 15px; border-radius: 10px; border: 1px solid #00ff41; font-size: 16px; margin: 20px 0; color: #fff; min-height: 20px; }
        .loader { width: 0%; height: 5px; background: #00ff41; margin-bottom: 15px; transition: 0.3s; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #00ff41; border: none; color: #000; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        .copy-btn { background: #333; color: #fff; border: 1px solid #555; }
        .note { font-size: 11px; color: #888; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ZerzBan Panel</h1>
        <a href="https://t.me/ZerzBanXCheats" class="channel-link">اشترك في قناتنا على تلجرام</a>
        
        <div id="loader" class="loader"></div>
        <div id="keyBox" class="key-display">اضغط توليد مفتاح</div>
        
        <button id="genBtn" onclick="generateKey()">توليد مفتاح جديد</button>
        <button class="copy-btn" onclick="copyKey()">نسخ المفتاح</button>
        
        <p class="note">ملاحظة: المفتاح مدته 24 ساعة ويشتغل لهاتف واحد فقط. استمتع.</p>
    </div>

    <script>
        function generateKey() {
            const btn = document.getElementById("genBtn");
            const loader = document.getElementById("loader");
            const keyBox = document.getElementById("keyBox");

            btn.disabled = true;
            loader.style.width = "0%";
            keyBox.innerText = "جاري التوليد...";

            let progress = 0;
            let interval = setInterval(() => {
                progress += 20;
                loader.style.width = progress + "%";
                if(progress >= 100) {
                    clearInterval(interval);
                    const random = Math.floor(100000 + Math.random() * 900000);
                    keyBox.innerText = "ZerzBan-X-Cheats-" + random;
                    btn.disabled = false;
                }
            }, 1000); // 5 ثواني
        }

        function copyKey() {
            const text = document.getElementById("keyBox").innerText;
            if(text.includes("ZerzBan")) {
                navigator.clipboard.writeText(text);
                alert("تم نسخ المفتاح!");
            }
        }
    </script>
</body>
</html>
